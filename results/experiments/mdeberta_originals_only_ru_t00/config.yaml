# Experiment Configuration
# Model: mDeBERTa v3 base (fine-tuned on ORIGINALS ONLY, no translations)
# Method: Fine-tuned mDeBERTa (Originals Only)
# Strategy: Hierarchical multi-head classification
# Language: RU
# Temperature: N/A (deterministic)
# Runs: 5
# Variance: MC Dropout (dropout active during inference)
#
# Fine-tuned on original training texts only (translations excluded)
# This isolates the impact of translation augmentation

model_name: mdeberta:microsoft/mdeberta-v3-base
input_folder: data/dev-documents_4_December/RU/subtask-2-documents/
output_file: results/experiments/mdeberta_originals_only_ru_t00/run_1/results.txt
temperature: 0.0
top_p: 1.0
max_tokens: 512
hierarchical_strategy: multi_head
num_narrative_agents: 1
num_subnarrative_agents: 1
narrative_aggregation_method: single
subnarrative_aggregation_method: single
enable_validation: false
enable_narrative_validation: false
enable_subnarrative_validation: false
enable_retrieval: false
enable_cleaning: false
enable_text_cleaning: false
max_concurrency: 1
enable_cost_tracking: false
threshold: 0.55
